<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeFlow • Your Personal OS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #eee; --accent: #00b4d8; --border: #333; --success: #22c55e; }
    [data-theme="light"] { --bg: #f8f9fa; --card: #ffffff; --text: #222; --accent: #0077b6; --border: #ddd; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
    header { background:var(--card); padding:0.8rem 1.5rem; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
    nav button { margin:0 0.25rem; padding:0.6rem 1.1rem; border:none; background:var(--card); color:var(--text); border-radius:8px; cursor:pointer; }
    nav button.active { background:var(--accent); color:white; }
    .container { max-width:1600px; margin:0 auto; padding:1.5rem; }
    .page { display:none; }
    .page.active { display:block; }
    .card { background:var(--card); border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; border:1px solid var(--border); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:1.5rem; }
    .item { background:#222; padding:1rem; border-radius:8px; margin-bottom:0.75rem; }
    [data-theme="light"] .item { background:#f1f1f1; }
    .price-card { display:flex; justify-content:space-between; align-items:center; padding:1rem; background:#222; border-radius:10px; margin-bottom:0.75rem; }
    .checklist-item { 
      display:flex; 
      align-items:flex-start; 
      gap:1rem; 
      padding:1rem; 
      background:#222; 
      border-radius:8px; 
      margin-bottom:1rem; 
    }
    .checklist-item input[type="checkbox"] { 
      margin-top:6px; 
      width:20px; 
      height:20px; 
      flex-shrink: 0;
    }
    .checklist-content { flex: 1; min-width: 0; }
    .checklist-content strong { font-size: 1.1rem; display:block; margin-bottom:4px; }
    .checklist-content small { color: #aaa; }
    .memo-textarea { 
      width:100%; 
      height:80px; 
      margin-top:8px; 
      resize: vertical; 
    }
    .links-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:1rem; }
    .link-item { 
      display:flex; 
      align-items:center; 
      gap:1rem; 
      padding:1rem; 
      background:#222; 
      border-radius:8px; 
      text-decoration:none; 
      color:var(--text); 
    }
    .link-item:hover { background:var(--accent); color:white; }
    button { padding:0.6rem 1.2rem; border:none; background:var(--accent); color:white; border-radius:8px; cursor:pointer; }
    input, textarea, select { 
      padding:0.75rem; 
      background:#222; 
      border:1px solid var(--border); 
      border-radius:8px; 
      color:white; 
    }
    [data-theme="light"] input, [data-theme="light"] textarea, [data-theme="light"] select { background:white; color:#222; }
    .done { text-decoration: line-through; opacity:0.7; }
  </style>
</head>
<body>
  <header>
    <h1>LifeFlow</h1>
    <nav id="tabs"></nav>
    <div>
      <button onclick="toggleTheme()">🌗</button>
      <button onclick="exportJSON()">Export JSON</button>
      <button onclick="document.getElementById('importInput').click()">Import</button>
      <input type="file" id="importInput" style="display:none" onchange="handleFileImport(event)">
    </div>
  </header>

  <div class="container">
    <!-- Dashboard -->
    <div id="dashboard" class="page active">
      <h2>Dashboard</h2>
      <div class="grid">
        <div class="card"><h3>Long-term Targets</h3><div id="dashLT"></div></div>
        <div class="card"><h3>Active Short-term</h3><div id="dashST"></div></div>
        <div class="card">
          <h3>Live Prices</h3>
          <div id="livePrices" class="grid"></div>
        </div>
      </div>
    </div>

    <!-- Daily Plan -->
    <div id="daily" class="page">
      <h2>Daily Plan</h2>
      <div id="dailyChecklist"></div>
    </div>

    <!-- Links -->
    <div id="links" class="page">
      <h2>Quick Links</h2>
      <div style="margin-bottom:1rem;">
        <button onclick="setLinksView('large')">Large Icons</button>
        <button onclick="setLinksView('small')">Small</button>
        <button onclick="setLinksView('list')">List View</button>
      </div>
      <div class="card"><h3>Websites</h3><div id="websitesContainer" class="links-grid"></div></div>
      <div class="card"><h3>Tools &amp; AI</h3><div id="toolsContainer" class="links-grid"></div></div>
    </div>

    <!-- Other pages (Long-term, Short-term, Projects, Tasks, Notes) -->
    <div id="longterm" class="page"><h2>Long-term Targets</h2><div id="ltList" class="grid"></div></div>
    <div id="shortterm" class="page"><h2>Short-term Targets</h2><div id="stList" class="grid"></div></div>
    <div id="projects" class="page"><h2>Projects</h2><div id="projList" class="grid"></div></div>
    <div id="tasks" class="page"><h2>Tasks</h2><div id="taskKanban" class="grid"></div></div>
    <div id="notes" class="page"><h2>Notes</h2><textarea id="mainNotes" style="height:70vh;width:100%;"></textarea></div>
  </div>

  <script>
    let appData = {
      longTargets: [{name:"LT1"}, {name:"LT2"}, {name:"LT3"}],
      shortTargets: [
        {name:"ST1", relatedLT:"LT1"},
        {name:"ST2", relatedLT:"LT1"},
        {name:"ST3", relatedLT:"LT2"},
        {name:"ST4", relatedLT:"LT3"}
      ],
      projects: [
        {name:"Proj1", relatedST:"ST1"},
        {name:"Prj2", relatedST:"ST2"},
        {name:"Prj3", relatedST:"ST3"},
        {name:"Prj4", relatedST:"ST4"},
        {name:"Prj5", relatedST:"ST2"}
      ],
      tasks: [
        {name:"Tsk1", relatedProject:"Proj1", status:"todo"},
        {name:"Tsk2", relatedProject:"Prj3", status:"todo"},
        {name:"Tsk3", relatedProject:"Proj1", status:"progress"},
        {name:"Tsk4", relatedProject:"Prj4", status:"todo"},
        {name:"Tsk5", relatedProject:"Prj5", status:"done"}
      ],
      notes: "",
      dailyPlan: [],
      linksView: 'large'
    };

    const dailyItems = [ /* your full list from previous message */ 
      {id:1, time:"05:00-07:00", label:"Exercise", everyOtherDay:true},
      {id:2, time:"05:00-07:00", label:"Training", everyOtherDay:true},
      {id:3, time:"07:00-07:05", label:"Mindfulness Practice"},
      {id:4, time:"07:50-08:00", label:"Checking the Messages"},
      {id:5, time:"08:00-08:05", label:"Most Important Tasks / Priorities"},
      {id:6, time:"08:05-08:30", label:"Specify colleagues’ jobs or tasks"},
      {id:7, time:"08:30-09:30", label:"Check new enquires"},
      {id:8, time:"09:30-10:30", label:"Track proposals"},
      {id:9, time:"10:30-12:30", label:"Marketing calls"},
      {id:10,time:"12:30-13:30", label:"Market Study"},
      {id:11,time:"13:30-14:30", label:"New Products"},
      {id:12,time:"15:00-16:00", label:"Reporting"}
    ];

    const websiteLinks = [
      {name:"Setad Iran", url:"https://www.setadiran.ir"},
      {name:"Eitaa", url:"https://web.eitaa.com"},
      {name:"WhatsApp Web", url:"https://web.whatsapp.com"},
      {name:"Personal Gmail", url:"https://mail.google.com"},
      {name:"PSS Gmail", url:"https://mail.google.com"}
    ];

    const toolLinks = [
      {name:"Grok", url:"https://x.ai"},
      {name:"ChatGPT", url:"https://chat.openai.com"},
      {name:"DeepSeek", url:"https://deepseek.com"},
      {name:"Outlook", url:"https://outlook.live.com"},
      {name:"Mizito", url:"#"} 
    ];

    function loadData() {
      const saved = localStorage.getItem('lifeFlowData');
      if (saved) appData = JSON.parse(saved);
      if (!appData.dailyPlan || appData.dailyPlan.length === 0) {
        appData.dailyPlan = dailyItems.map(item => ({...item, done: false, memo: ""}));
      }
    }

    function saveData() {
      localStorage.setItem('lifeFlowData', JSON.stringify(appData));
    }

    function renderTabs() {
      const tabsHTML = `
        <button onclick="switchPage('dashboard')">Dashboard</button>
        <button onclick="switchPage('longterm')">Long-term</button>
        <button onclick="switchPage('shortterm')">Short-term</button>
        <button onclick="switchPage('projects')">Projects</button>
        <button onclick="switchPage('tasks')">Tasks</button>
        <button onclick="switchPage('daily')">Daily Plan</button>
        <button onclick="switchPage('notes')">Notes</button>
        <button onclick="switchPage('links')">Links</button>
      `;
      document.getElementById('tabs').innerHTML = tabsHTML;
    }

    function switchPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(page).classList.add('active');
      if (page === 'daily') renderDailyPlan();
      if (page === 'links') renderLinks();
      if (page === 'dashboard') renderDashboard();
    }

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    }

    function renderDashboard() {
      document.getElementById('livePrices').innerHTML = `
        <div class="price-card"><strong>BTC</strong><span>$68,450</span><span style="color:var(--success)">+1.2%</span></div>
        <div class="price-card"><strong>AAPL</strong><span>$238.10</span><span style="color:red">-0.4%</span></div>
        <div class="price-card"><strong>GOLD</strong><span>$2,652</span><span style="color:var(--success)">+0.8%</span></div>
      `;
    }

    function renderDailyPlan() {
      const container = document.getElementById('dailyChecklist');
      let html = '';
      appData.dailyPlan.forEach((item, index) => {
        html += `
          <div class="checklist-item ${item.done ? 'done' : ''}">
            <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleDailyDone(${index})">
            <div class="checklist-content">
              <strong>${item.label}</strong>
              <small>${item.time}</small>
              <textarea class="memo-textarea" placeholder="Add memo / notes here..." onblur="updateMemo(${index}, this.value)">${item.memo || ''}</textarea>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function toggleDailyDone(index) {
      appData.dailyPlan[index].done = !appData.dailyPlan[index].done;
      saveData();
      renderDailyPlan();
    }

    function updateMemo(index, value) {
      appData.dailyPlan[index].memo = value;
      saveData();
    }

    function renderLinks() {
      const webContainer = document.getElementById('websitesContainer');
      const toolsContainer = document.getElementById('toolsContainer');
      webContainer.innerHTML = websiteLinks.map(l => `<a href="${l.url}" target="_blank" class="link-item">${l.name}</a>`).join('');
      toolsContainer.innerHTML = toolLinks.map(l => `<a href="${l.url}" target="_blank" class="link-item">${l.name}</a>`).join('');
    }

    function setLinksView(mode) {
      appData.linksView = mode;
      renderLinks();
    }

    function exportJSON() {
      const blob = new Blob([JSON.stringify(appData, null, 2)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = "LifeFlow-Backup.json"; a.click();
    }

    function handleFileImport(e) {
      // Keep previous import logic
      alert("Import functionality ready (Excel/JSON)");
    }

    // Initialize
    loadData();
    renderTabs();
    switchPage('dashboard');
    renderDailyPlan();
    renderLinks();
  </script>
</body>
</html>
